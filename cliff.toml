# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration

[changelog]
# A Tera template rendered once at the top of the changelog.
header = """
# Changelog

All notable changes to this project are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
# A Tera template rendered for each release.
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}](https://github.com/elioetibr/skald-rust/releases/tag/{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | upper_first }} \
            ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/elioetibr/skald-rust/commit/{{ commit.id }}))\
    {% endfor %}
{% endfor %}\n
"""
# A Tera template rendered once at the bottom of the changelog.
footer = """
<!-- generated by git-cliff -->
"""
# Remove leading and trailing whitespaces from the changelog's body.
trim = true
# Render body even when there are no releases to process.
render_always = true

[git]
# Parse commits according to the conventional commits specification.
conventional_commits = true
# Keep non-conventional commits too (e.g. the initial `init:` commit) instead of
# dropping them silently — they are bucketed under "Other" by the catch-all parser.
filter_unconventional = false
# Do not require every commit to be conventional.
require_conventional = false
# Process each commit line as an individual commit.
split_commits = false
# Regex preprocessors applied to commit messages before parsing.
commit_preprocessors = [
  # Turn `(#123)` issue/PR references into links.
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/elioetibr/skald-rust/issues/${2}))" },
]
# Keep breaking-change commits even if a parser would otherwise skip them.
protect_breaking_commits = false
# Regex parsers that assign commits to groups (order matters; first match wins).
# The array below is GENERATED from commit-types.toml — edit that file, then run
# `mise run commit-config`. The marker lines are preserved across regeneration.
# >>> commit-config:parsers (generated from commit-types.toml — do not edit) >>>
commit_parsers = [
  { message = "^chore\\(release\\): prepare for", skip = true },
  { message = "^chore\\(deps.*\\)", skip = true },
  { message = "^chore\\(pr\\)", skip = true },
  { message = "^chore\\(pull\\)", skip = true },
  { message = "^feat", group = "<!-- 0 -->🚀 Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^refactor", group = "<!-- 2 -->🚜 Refactor" },
  { message = "^docs", group = "<!-- 3 -->📚 Documentation" },
  { message = "^perf", group = "<!-- 4 -->⚡ Performance" },
  { message = "^style", group = "<!-- 5 -->🎨 Styling" },
  { message = "^test", group = "<!-- 6 -->🧪 Testing" },
  { message = "^chore", group = "<!-- 7 -->⚙️ Miscellaneous Tasks" },
  { message = "^ci", group = "<!-- 7 -->⚙️ Miscellaneous Tasks" },
  { message = "^build", group = "<!-- 7 -->⚙️ Miscellaneous Tasks" },
  { message = "^init", group = "<!-- 7 -->🎉 Repository Initialization" },
  { body = ".*security", group = "<!-- 8 -->🛡️ Security" },
  { message = "^revert", group = "<!-- 9 -->◀️ Revert" },
  { message = ".*", group = "<!-- 10 -->💼 Other" },
]
# <<< commit-config:parsers <<<
# Keep all commits even if unmatched (the catch-all above matches everything).
filter_commits = false
# Do not abort on an unmatched commit.
fail_on_unmatched_commit = false
# Include only tags reachable from the current branch.
use_branch_tags = false
# Order releases and commits chronologically (oldest first within a release).
topo_order = false
sort_commits = "oldest"
# Regex to match the tags that mark releases. The `v` prefix is optional so
# both `git cliff --bump` (bare semver) and explicit `vX.Y.Z` tags are accepted.
tag_pattern = "v?[0-9].*"

[bump]
# Derive the next version from conventional commit types when using `--bump`.
features_always_bump_minor = true
breaking_always_bump_major = true
