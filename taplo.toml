# taplo configuration ~ https://taplo.tamasfe.dev/configuration/file.html
#
# taplo is the formatter of record for EVERY .toml in this repo (auto-discovered
# at the repo root, no --config flag needed — mirrors how gitleaks finds
# .gitleaks.toml and actionlint finds .github/actionlint.yaml).
#
# Division of labour with cargo-sort: taplo owns TOML *formatting* (whitespace,
# indentation, array collapsing); cargo-sort owns Cargo.toml dependency
# *ordering*. taplo is configured NOT to reorder keys or arrays so the two never
# fight — the pipeline runs `cargo sort` first, then `taplo fmt` as the final
# normalizing pass.

# The yaml-test-suite submodule is a third-party conformance corpus; never
# reformat its (or any vendored) TOML.
exclude = ["crates/skald-yaml-test-suite/data/**"]

[formatting]
# Leave key and array order exactly as written: package-metadata key order is
# intentional, and dependency order is cargo-sort's responsibility, not taplo's.
reorder_keys = false
reorder_arrays = false
